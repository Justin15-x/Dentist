    <div class="auth-brand__tagline">
      <h1>El expediente de tu consultorio, ordenado como una arcada.</h1>
      <p>Pacientes, citas y pagos en un solo lugar — cada pieza en su número, cada dato en su sitio.</p>
    </div>
  </section>

  <section class="auth-panel">
    <div class="auth-card">
      <div class="auth-tabs">
        <button class="auth-tab is-active" data-tab="login">Iniciar sesión</button>
        <button class="auth-tab" data-tab="register">Crear cuenta</button>
      </div>

      <div class="alert alert--error" id="auth-error"></div>

      <form class="auth-form is-active" id="login-form" novalidate>
        <div class="field">
          <label for="login-email">Correo electrónico</label>
          <input type="email" id="login-email" name="email" required autocomplete="email" placeholder="tu@consultorio.com" />
        </div>
        <div class="field">
          <label for="login-password">Contraseña</label>
          <input type="password" id="login-password" name="password" required autocomplete="current-password" placeholder="••••••••" />
        </div>
        <button class="btn btn-primary auth-submit" type="submit">
          <span class="btn-label">Entrar</span>
        </button>
      </form>

      <form class="auth-form" id="register-form" novalidate>
        <div class="field">
          <label for="reg-name">Nombre completo</label>
          <input type="text" id="reg-name" name="full_name" required autocomplete="name" placeholder="Dra. Ana Torres" />
        </div>
        <div class="field">
          <label for="reg-email">Correo electrónico</label>
          <input type="email" id="reg-email" name="email" required autocomplete="email" placeholder="tu@consultorio.com" />
        </div>
        <div class="field">
          <label for="reg-password">Contraseña</label>
          <input type="password" id="reg-password" name="password" required minlength="8" autocomplete="new-password" placeholder="Mínimo 8 caracteres" />
        </div>
        <button class="btn btn-primary auth-submit" type="submit">
          <span class="btn-label">Crear cuenta</span>
        </button>
      </form>
    </div>
  </section>
</div>

<script type="module" src="js/auth.page.js"></script>
</body>
</html>
